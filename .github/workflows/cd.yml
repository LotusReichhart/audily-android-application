name: CD (Continuous Deployment)

on:
  push:
    tags:
      - 'v*'

jobs:
  deploy:
    name: Build & Deploy Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Decode Keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          mkdir -p app/keystore
          echo "$KEYSTORE_BASE64" | base64 --decode > app/keystore/audily_key_store.jks

      - name: Build Release AAB
        env:
          APP_KS_PATH: keystore/audily_key_store.jks
          APP_KS_PASS: ${{ secrets.KEYSTORE_PASSWORD }}
          APP_KS_ALIAS: ${{ secrets.KEY_ALIAS }}
          APP_KS_KEY_PASS: ${{ secrets.KEY_PASSWORD }}
        run: ./gradlew bundleRelease

      - name: Upload to Google Play (Internal Track)
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonRaw: ${{ secrets.PLAY_CONSOLE_JSON }}
          packageName: com.lotusreichhart.audily
          releaseFiles: app/build/outputs/bundle/release/*.aab
          track: internal
          status: completed
