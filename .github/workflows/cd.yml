name: CD (Continuous Deployment)

on:
  push:
    tags:
      - 'v*'

jobs:
  deploy:
    name: Build & Deploy Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew
        # Đảm bảo lệnh gradlew có quyền thực thi trên môi trường Ubuntu

      - name: Decode Keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          mkdir -p app/keystore
          echo "$KEYSTORE_BASE64" | base64 --decode > app/keystore/audily_key_store.jks
        # Giải mã chuỗi Base64 từ secrets thành file keystore vật lý

      - name: Build Release AAB
        env:
          KEYSTORE_PATH: keystore/audily_key_store.jks
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: ./gradlew bundleRelease
        # Build bản Release App Bundle (.aab) với thông tin ký từ Secrets

      - name: Upload to Google Play (Internal Track)
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonRaw: ${{ secrets.PLAY_CONSOLE_JSON }}
          packageName: com.lotusreichhart.audily
          releaseFiles: app/build/outputs/bundle/release/*.aab
          track: internal
          status: completed
        # Tự động đẩy bản build lên Google Play Console (Internal track)
