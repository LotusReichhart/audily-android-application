name: CD (Continuous Deployment)

on:
  push:
    tags:
      - 'v*'

jobs:
  deploy:
    name: Build & Deploy Release
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Decode Keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          mkdir -p app/keystore
          echo "$KEYSTORE_BASE64" | base64 --decode > app/keystore/audily_key_store.jks

      - name: Build Release AAB
        env:
          KEYSTORE_PATH: keystore/audily_key_store.jks
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: ./gradlew bundleProdRelease

      - name: Upload to Google Play (Internal Track)
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonRaw: ${{ secrets.PLAY_CONSOLE_JSON }}
          packageName: com.lotusreichhart.audily
          releaseFiles: app/build/outputs/bundle/prodRelease/*.aab
          track: internal
          status: completed

      - name: Create GitHub Release
        id: create_release
        if: success()
        uses: softprops/action-gh-release@v2
        with:
          files: app/build/outputs/bundle/prodRelease/*.aab
          name: Release ${{ github.ref_name }}
          tag_name: ${{ github.ref }}
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Send Telegram Notification
        uses: appleboy/telegram-action@master
        if: always()
        with:
          to: ${{ secrets.TELEGRAM_TO }}
          token: ${{ secrets.TELEGRAM_TOKEN }}
          format: markdown
          message: |
            *Audily CD Report - Production Release*
            
            *Status:* ${{ job.status == 'success' && '✅ Deployed' || '❌ Failed' }}
            *Version:* `${{ github.ref_name }}`
            *Action:* `${{ github.workflow }}`
            
            [Download Release](${{ github.server_url }}/${{ github.repository }}/releases/tag/${{ github.ref_name }})
            [View Build Results](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})
